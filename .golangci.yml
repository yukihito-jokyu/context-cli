version: "2"

linters:
  default: standard
  enable:
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - err113
    - errorlint
    - exhaustive
    - fatcontext
    - forcetypeassert
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - gocritic
    - gosec
    - interfacebloat
    - misspell
    - mnd
    - modernize
    - nilerr
    - nilnil
    - nolintlint
    - predeclared
    - revive
    - thelper
    - unparam
    - usestdlibvars
    - wrapcheck
  settings:
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 15
    interfacebloat:
      max: 5
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      enable-default-rules: true
      rules:
        - name: argument-limit
          arguments:
            - 4
        - name: function-result-limit
          arguments:
            - 3
        - name: package-comments
          disabled: true
  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - dupl
          - mnd
      - linters:
          - gosec
        text: "G115"

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
